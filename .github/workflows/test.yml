name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Run tests
      run: |
        uv run test/test_case.py verify-all

    - name: Check AGENTS.md is up to date
      run: |
        uv run repo-layout-skills/scripts/inline_yaml.py update AGENTS.md --dry-run --any-not-up-to-date-exit-1
